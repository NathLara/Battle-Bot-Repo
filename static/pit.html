<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BattleBots Pit Display</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      padding: 0;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header-pit {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.4);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
    }

    .pit-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 40%, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .local-clock {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-cyan);
      text-shadow: var(--shadow-glow-cyan);
    }

    .pit-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 30px;
      padding: 30px;
      overflow: hidden;
    }

    .scroll-container {
      position: relative;
      flex: 1;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      background: var(--bg-panel);
      padding: 20px;
    }

    .scroll-content {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 0;
      will-change: transform;
    }

    .info-column {
      display: flex;
      flex-direction: column;
      gap: 25px;
      height: 100%;
    }

    .side-info-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .info-header {
      font-size: 1.25rem;
      text-transform: uppercase;
      color: var(--accent-cyan);
      border-bottom: 2px solid var(--glass-border-glow);
      padding-bottom: 8px;
      margin-bottom: 15px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      text-align: center;
      flex: 1;
      padding: 20px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .team-highlight {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .queue-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .queue-item:last-child {
      margin-bottom: 0;
    }

    .queue-badge {
      padding: 4px 8px;
      background: rgba(0, 242, 254, 0.1);
      border: 1px solid var(--glass-border-glow);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-cyan);
      text-transform: uppercase;
    }

    .queue-teams {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .queue-time {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
  </style>
</head>

<body>

  <header class="header-pit">
    <div class="pit-logo">BattleBots Pit Arena</div>
    <div id="local-clock" class="local-clock">00:00 PM</div>
  </header>

  <div class="pit-layout">
    <!-- Standings Column -->
    <div style="display: flex; flex-direction: column; height: 100%;">
      <div id="pit-left-header" class="info-header" style="margin-bottom: 10px;">Current Leaderboard</div>
      <div class="scroll-container">
        <div id="scroll-content" class="scroll-content">
          <table style="width: 100%;">
            <thead>
              <tr style="position: sticky; top: 0; background: var(--bg-panel-solid); z-index: 10;">
                <th style="padding: 16px;">Rank</th>
                <th style="padding: 16px;">Robot</th>
                <th style="padding: 16px;">Team Name</th>
                <th style="padding: 16px; text-align: center;">Record</th>
                <th style="padding: 16px; text-align: center;">Win %</th>
                <th style="padding: 16px; text-align: center;">SOS %</th>
              </tr>
            </thead>
            <tbody id="standings-rows">
              <!-- Scroll rows go here -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Info Displays Column -->
    <div class="info-column">
      <!-- Last Match Card -->
      <div class="side-info-card glass-panel result-card-glow">
        <div class="info-header">Last Match Result</div>
        <div class="result-content">
          <div id="last-match-label"
            style="font-size: 1.2rem; font-weight: 700; color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 2px;">
            --</div>
          <div id="last-match-vs" style="font-size: 1.6rem; font-weight: 800; margin: 12px 0; color: var(--text-main);">
            No Matches Logged</div>
        </div>
      </div>

      <!-- Up Next Card -->
      <div class="side-info-card glass-panel">
        <div class="info-header">Upcoming Matches</div>
        <div id="upcoming-queue" style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
          <!-- Next matches here -->
          <div style="text-align: center; color: var(--text-muted);">No matches scheduled</div>
        </div>
      </div>
    </div>
  </div>

  <script src="pit.js?v=2"></script>
</body>

</html>
